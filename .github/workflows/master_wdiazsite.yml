# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - wdiazsite

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://wdiazcontainerregistry.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_4b6e80aa694f4549a10c376df5a0246a }}
        password: ${{ secrets.AzureAppService_ContainerPassword_e2ded57d36d848258e0dad129e587f63 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: wdiazcontainerregistry.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_4b6e80aa694f4549a10c376df5a0246a }}/wdiaz-testing:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'testcontainer'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_ad307ebdf70447a19774315918a9c69d }}
        images: 'wdiazcontainerregistry.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_4b6e80aa694f4549a10c376df5a0246a }}/wilbot-nodejs:${{ github.sha }}'
